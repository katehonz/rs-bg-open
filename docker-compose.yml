version: '3.8'

services:
  # PostgreSQL База данни
  db:
    image: postgres:15-alpine
    container_name: accounting_db
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=bg_BG.UTF-8 --lc-ctype=bg_BG.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d accounting"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accounting_network

  # Главен счетоводен сервиз (Rust)
  accounting-service:
    build:
      context: .
      dockerfile: Dockerfile.accounting
    container_name: accounting_service
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-change_me_in_production}@db:5432/accounting
      RUST_LOG: info
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    networks:
      - accounting_network

volumes:
  postgres_data:

networks:
  accounting_network:
    driver: bridge